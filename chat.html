<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH19TEAM AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(28px) saturate(200%);
            --user-msg: rgba(59, 130, 246, 0.4);
            --ai-msg: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: #000;
            color: var(--text-main);
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #000000 100%);
            z-index: -1;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
        }

        #messages::-webkit-scrollbar { display: none; }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--ai-msg); border-bottom-left-radius: 4px; }

        .input-area {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            padding: 15px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .typing { display: flex; gap: 5px; padding: 10px; }
        .dot { width: 6px; height: 6px; background: white; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="chat-container">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, side, isHTML = false) {
            const div = document.createElement('div');
            div.className = `message ${side}`;
            if (isHTML) {
                div.innerHTML = text;
            } else {
                div.textContent = text;
            }
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return div;
        }

        function getTypingIndicatorHTML() {
            return `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        }

        async function chat() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.disabled = true;
            sendBtn.disabled = true;
            
            addMessage(text, 'user');
            userInput.value = '';

            const aiMessageElement = addMessage(getTypingIndicatorHTML(), 'ai', true);

            try {
                // ОТПРАВЛЯЕМ ЗАПРОС НА НАШ БУДУЩИЙ СЕРВЕР (Vercel API)
                const response = await fetch('/api/chat.mjs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) throw new Error('Ошибка сервера');

                const data = await response.json();
                
                // Рендерим Markdown ответ от нейросети
                aiMessageElement.innerHTML = marked.parse(data.text || "Нет ответа");
            } catch (error) {
                console.error("Ошибка:", error);
                aiMessageElement.innerHTML = `<span style="color: #ffb3b3;">Упс, произошла ошибка. Проверьте VPN или настройки сервера.</span>`;
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }

        sendBtn.addEventListener('click', chat);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') chat();
        });
    </script>
</body>
</html>
