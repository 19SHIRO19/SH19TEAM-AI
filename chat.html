<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SH19TEAM AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
            --user-msg: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            --ai-msg: rgba(0, 0, 0, 0.4);
            --text-muted: rgba(255, 255, 255, 0.5);
        }

        body {
            background: #000;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(225,39%,25%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(339,49%,25%,1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(200,40%,20%,1) 0, transparent 50%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* УВЕЛИЧЕННАЯ ВЕРХНЯЯ ПАНЕЛЬ */
        #chat-header {
            padding: calc(env(safe-area-inset-top) + 20px) 20px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1.5px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            text-transform: uppercase;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #messages::-webkit-scrollbar { width: 0; }

        .message-wrapper {
            display: flex;
            flex-direction: column; 
            width: 100%; 
            max-width: 850px; 
            align-self: center;
            animation: appear 0.3s ease-out;
        }
        @keyframes appear { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .wrapper-user { align-items: flex-end; }
        .wrapper-ai { align-items: flex-start; }

        .message { 
            padding: 14px 22px; 
            border-radius: 24px; 
            font-size: 15px; 
            line-height: 1.6; 
            word-wrap: break-word;
            max-width: 85%;
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
        }
        
        .user { background: var(--user-msg); border-bottom-right-radius: 6px; }
        .ai { background: var(--ai-msg); border-bottom-left-radius: 6px; }

        .ai p { margin: 0 0 10px 0; }
        .ai p:last-child { margin: 0; }
        .ai pre { background: rgba(0,0,0,0.4); padding: 14px; border-radius: 12px; overflow-x: auto; margin: 10px 0; border: 1px solid var(--glass-border); }
        .ai code { font-family: monospace; background: rgba(0,0,0,0.3); padding: 3px 6px; border-radius: 6px; }

        #input-area { 
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom));
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-top: 1px solid var(--glass-border); 
            display: flex;
            justify-content: center;
        }

        .input-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        input { 
            flex: 1; 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--glass-border); 
            color: white;
            padding: 16px 24px; 
            border-radius: 30px; 
            font-size: 16px; 
            outline: none; 
            transition: all 0.3s ease;
        }
        input:focus { border-color: rgba(255,255,255,0.4); background: rgba(0, 0, 0, 0.3); }
        input::placeholder { color: var(--text-muted); }
        
        button { 
            background: rgba(255, 255, 255, 0.15); 
            color: white; 
            border: 1px solid var(--glass-border); 
            width: 52px; height: 52px; border-radius: 50%; 
            cursor: pointer; transition: all 0.3s ease; 
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0;
        }
        button:hover { background: rgba(255, 255, 255, 0.25); transform: scale(1.05); }
        button svg { width: 22px; height: 22px; fill: currentColor; }

        .typing { display: flex; gap: 5px; padding: 10px 5px; }
        .dot { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">SH19TEAM AI beta 0.1</div>
    
    <div id="messages">
        <div class="message-wrapper wrapper-ai">
            <div class="message ai">Привет! Я нейросеть, от SH19TEAM. О чем пообщаемся?</div>
        </div>
    </div>
    
    <div id="input-area">
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Спросите меня о чем угодно..." autocomplete="off">
            <button id="send-btn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, sender, isHTML = false) {
        const wrapper = document.createElement('div');
        wrapper.classList.add('message-wrapper', `wrapper-${sender}`);
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        
        if (isHTML) { msgDiv.innerHTML = text; } 
        else { msgDiv.innerText = text; }

        wrapper.appendChild(msgDiv);
        messagesContainer.appendChild(wrapper);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        return msgDiv;
    }

    async function chat() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.disabled = true;
        addMessage(text, 'user');
        userInput.value = '';

        const aiMessageElement = addMessage('<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>', 'ai', true);

        try {
            const response = await fetch('/api/chat.js', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            
            if (window.marked) {
                aiMessageElement.innerHTML = marked.parse(data.reply || "Пустой ответ");
            } else {
                aiMessageElement.innerText = data.reply;
            }

        } catch (error) {
            aiMessageElement.innerHTML = `<span style="color: #ffb3b3;">Упс, ошибка: Проверьте настройки сервера</span>`;
        } finally {
            userInput.disabled = false;
            userInput.focus();
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    }

    sendBtn.addEventListener('click', chat);
    userInput.addEventListener('keypress', (e) => { 
        if(e.key === 'Enter' && !userInput.disabled) chat(); 
    });
</script>

</body>
</html>
